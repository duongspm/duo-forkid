<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Đảo Số — Nhận Biết Số — Bé Vui Học</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/common.css">
<style>
  html, body { height: 100%; overflow: hidden; }
  body { background: #222; }

  img.emoji {
    height: 1.5em; width: 1.5em;
    vertical-align: -0.15em;
    display: inline-block;
    filter: drop-shadow(0 0.2rem 0.3rem rgba(0,0,0,0.15));
  }

  .deck {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  .slide {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    -webkit-user-select: none;
  }

  .slide-number {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: min(70vh, 52vw);
    line-height: 1;
    text-shadow: 0 1rem 0 rgba(0,0,0,0.12), 0 1.6rem 3rem rgba(0,0,0,0.18);
    cursor: pointer;
    display: flex;
    position: relative;
  }

  .slide-word {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 5rem;
    margin-top: 0.5rem;
    text-shadow: 0 0.4rem 0 rgba(0,0,0,0.1);
  }

  .slide-icons {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.8rem;
    max-width: 120rem;
    margin-top: 3rem;
    font-size: 3.6rem;
  }

  .nav-arrow {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    width: 6.4rem; height: 6.4rem;
    border-radius: 50%;
    background: rgba(255,255,255,0.9);
    display: flex; align-items: center; justify-content: center;
    font-size: 3rem;
    color: var(--plum);
    z-index: 50;
    box-shadow: 0 0.6rem 1.6rem rgba(0,0,0,0.18);
  }
  .nav-arrow:active { transform: translateY(-50%) scale(0.88); }
  #prevArrow { left: 2rem; }
  #nextArrow { right: 2rem; }
  .nav-arrow.hidden { opacity: 0; pointer-events: none; }

  .dots {
    position: fixed;
    bottom: 2.4rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 0.9rem;
    z-index: 50;
  }
  .dot {
    width: 1.2rem; height: 1.2rem;
    border-radius: 50%;
    background: rgba(255,255,255,0.5);
    transition: transform 0.25s ease, background 0.25s ease;
  }
  .dot.active { background: white; transform: scale(1.3); }

  .repeat-btn {
    position: fixed;
    top: 2rem;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.9);
    padding: 0.9rem 2rem;
    border-radius: 3rem;
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 1.5rem;
    color: var(--plum);
    z-index: 50;
    box-shadow: 0 0.5rem 1.4rem rgba(0,0,0,0.15);
  }
  .slide-icons-hero{
    position: absolute;
    left: 100%;
    bottom: 0;
    width: 60%;
  }
  .slide-icons-hero img.emoji{
    height: min(60vh, 30em);
    width: min(60vh, 30em);
  }
   /* ---------- Responsive: phone screens ---------- */
  @media (max-width: 768px) {
    .back-btn, .sound-toggle {
      width: 5rem; height: 5rem;
      font-size: 2.2rem;
      top: 1.2rem;
    }
    .back-btn { left: 1.2rem; }
    .sound-toggle { right: 1.2rem; }

    .repeat-btn {
      top: auto;
      bottom: 6.5rem;
      font-size: 1.3rem;
      padding: 0.7rem 1.6rem;
    }

    .nav-arrow {
      width: 5rem; height: 5rem;
      font-size: 2.4rem;
    }
    #prevArrow { left: 0.8rem; }
    #nextArrow { right: 0.8rem; }

    .slide-number { font-size: min(34vh, 40vw); }
    .slide-word { font-size: 2.2rem; }

    .slide-icons {
      max-width: 88vw;
      font-size: 2.4rem;
      gap: 0.5rem;
      margin-top: 2rem;
    }

    .dots { bottom: 1.4rem; }
  }

  /* ---------- Responsive: very short screens (landscape phone) ---------- */
  @media (max-height: 420px) {
    .slide-number { font-size: min(45vh, 26vw); }
    .slide-word { font-size: 1.8rem; margin-top: 0.2rem; }
    .slide-icons { margin-top: 1rem; font-size: 2rem; }
    .repeat-btn { display: none; }
  }
</style>
</head>
<body>

<a href="index.html" class="back-btn" aria-label="Quay lại bản đồ" style="z-index:60;">←</a>
<button class="sound-toggle" id="soundToggle" aria-label="Bật hoặc tắt âm thanh" style="z-index:60;">🔊</button>
<button class="repeat-btn" id="repeatBtn">🔁 Đọc lại</button>

<button class="nav-arrow" id="prevArrow" aria-label="Số trước">←</button>
<button class="nav-arrow" id="nextArrow" aria-label="Số sau">→</button>

<div class="deck" id="deck"></div>
<div class="dots" id="dots"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>
<script src="assets/js/reward-fx.js"></script>
<script src="assets/js/sound-manager.js"></script>
<script>
  const NUMBERS = [
    { n: 1,  word: 'Một',  from: '#FF9A76', to: '#FF6F45', icon: '🐈' },
    { n: 2,  word: 'Hai',  from: '#FFBB6B', to: '#FF9A2E', icon: '🐕' },
    { n: 3,  word: 'Ba',   from: '#FFE08A', to: '#FFC93C', icon: '🐮' },
    { n: 4,  word: 'Bốn',  from: '#C6E88C', to: '#9ED14E', icon: '🐇' },
    { n: 5,  word: 'Năm',  from: '#7DDCA0', to: '#42C171', icon: '🐭' },
    { n: 6,  word: 'Sáu',  from: '#7BDAD4', to: '#3AB8B0', icon: '🐓' },
    { n: 7,  word: 'Bảy',  from: '#79C7EE', to: '#3E9FDB', icon: '🐷' },
    { n: 8,  word: 'Tám',  from: '#9C9DEE', to: '#6F70DE', icon: '🎈' },
    { n: 9,  word: 'Chín', from: '#CB9DEB', to: '#A868DB', icon: '🚕' },
    { n: 10, word: 'Mười', from: '#F090C0', to: '#E0559C', icon: '✈️' },
    { n: 11, word: 'Mười một', from: '#FFB3BA', to: '#FF6B81', icon: '🦋' },
    { n: 12, word: 'Mười hai', from: '#FFD6A5', to: '#FF9F43', icon: '🦊' },
    { n: 13, word: 'Mười ba',  from: '#FFF3A3', to: '#FFD93D', icon: '🌻' },
    { n: 14, word: 'Mười bốn', from: '#D4F4A4', to: '#8FD14F', icon: '🐸' },
    { n: 15, word: 'Mười lăm', from: '#A8F0C6', to: '#38C172', icon: '🏍️' },
    { n: 16, word: 'Mười sáu', from: '#A8F0F0', to: '#32C5C7', icon: '🐬' },
    { n: 17, word: 'Mười bảy', from: '#A9D6FF', to: '#4A90E2', icon: '🪷' },
    { n: 18, word: 'Mười tám', from: '#C8C4FF', to: '#7B6CF6', icon: '⚽' },
    { n: 19, word: 'Mười chín',from: '#E3C7FF', to: '#B46BFF', icon: '🎀' },
    { n: 20, word: 'Hai mươi', from: '#FFC2DD', to: '#F06292', icon: '☂️' },
  ];

  const deck = document.getElementById('deck');
  const dotsWrap = document.getElementById('dots');
  const soundToggle = document.getElementById('soundToggle');
  const prevArrow = document.getElementById('prevArrow');
  const nextArrow = document.getElementById('nextArrow');
  const repeatBtn = document.getElementById('repeatBtn');

  let index = 0;
  const slides = [];

  soundToggle.addEventListener('click', () => {
    const nowMuted = !SoundManager.isMuted();
    SoundManager.setMuted(nowMuted);
    soundToggle.textContent = nowMuted ? '🔇' : '🔊';
  });

  NUMBERS.forEach((data, i) => {
    const slide = document.createElement('div');
    slide.className = 'slide';
    slide.style.background = `radial-gradient(circle at 50% 38%, ${data.from}, ${data.to})`;
    slide.style.opacity = i === 0 ? '1' : '0';
    slide.style.zIndex = i === 0 ? '2' : '1';

    const iconsRow = data.icon.repeat(data.n).split('').join(''); // placeholder, built below
    slide.innerHTML = `
      <div class="slide-number" data-n="${data.n}"><span>${data.n}</span><div class="slide-icons-hero">${data.icon}</div></div>
      <div class="slide-word">${data.word}</div>
      <div class="slide-icons">${data.icon.repeat(data.n)}</div>
      "
    `;
    deck.appendChild(slide);
    slides.push(slide);

    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.addEventListener('click', () => goTo(i));
    dotsWrap.appendChild(dot);
  });

  twemoji.parse(deck, { folder: 'svg', ext: '.svg' });

  function speakCurrent() {
    const data = NUMBERS[index];
    SoundManager.speak(`Số ${data.n}. ${data.word}`);
  }

  function playEntrance(slide) {
    const numEl = slide.querySelector('.slide-number');
    const wordEl = slide.querySelector('.slide-word');
    const icons = slide.querySelectorAll('.slide-icons .emoji, .slide-icons');
    gsap.fromTo(numEl, { scale: 0.3, rotation: -8, opacity: 0 }, { scale: 1, rotation: 0, opacity: 1, duration: 0.55, ease: 'back.out(2)' });
    gsap.fromTo(wordEl, { y: 20, opacity: 0 }, { y: 0, opacity: 1, duration: 0.4, delay: 0.15 });
    gsap.fromTo(slide.querySelectorAll('.slide-icons > *'),
      { scale: 0, opacity: 0 },
      { scale: 1, opacity: 1, duration: 0.35, stagger: 0.06, delay: 0.3, ease: 'back.out(2.4)' }
    );
  }

  function goTo(newIndex) {
    if (newIndex < 0 || newIndex >= NUMBERS.length || newIndex === index) return;
    const oldSlide = slides[index];
    const newSlide = slides[newIndex];
    const dir = newIndex > index ? 1 : -1;

    gsap.set(newSlide, { zIndex: 3, opacity: 1, x: dir * 60 + 'vw' });
    gsap.to(newSlide, { x: 0, duration: 0.45, ease: 'power2.out' });
    gsap.to(oldSlide, { x: -dir * 40 + 'vw', opacity: 0, duration: 0.4, ease: 'power2.in',
      onComplete: () => { oldSlide.style.zIndex = 1; gsap.set(oldSlide, { x: 0 }); } });

    playEntrance(newSlide);

    index = newIndex;
    dotsWrap.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === index));
    prevArrow.classList.toggle('hidden', index === 0);
    nextArrow.classList.toggle('hidden', index === NUMBERS.length - 1);

    speakCurrent();
  }

  prevArrow.addEventListener('click', () => goTo(index - 1));
  nextArrow.addEventListener('click', () => goTo(index + 1));
  repeatBtn.addEventListener('click', speakCurrent);

  slides.forEach(slide => {
    slide.querySelector('.slide-number').addEventListener('click', () => {
      speakCurrent();
      celebrate(window.innerWidth / 2, window.innerHeight / 2 - 100);
      gsap.fromTo(slide.querySelector('.slide-number'), { scale: 1.08 }, { scale: 1, duration: 0.25, ease: 'back.out(2)' });
    });
  });

  // Swipe gesture support
  let touchStartX = null;
  deck.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
  deck.addEventListener('touchend', e => {
    if (touchStartX === null) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 50) {
      if (dx < 0) goTo(index + 1); else goTo(index - 1);
    }
    touchStartX = null;
  }, { passive: true });

  // Init
  playEntrance(slides[0]);
  prevArrow.classList.add('hidden');
  speakCurrent();
</script>
</body>
</html>
