<style>
  body {
    background: linear-gradient(180deg, #DCEFFB 0%, var(--cream) 55%);

  img.emoji {

  .progress-dots {

  .dot {

  }

  .stage {
    flex: 1;

  }

  .fruit-btn {

    transition: filter 0.25s ease, width 0.2s ease, height 0.2s ease;
  }
  .fruit-btn.counted { filter: none; }
  .fruit-btn:active { transform: scale(0.85); }

  .complete-overlay {

<body>

<a href="index.html" class="back-btn" aria-label="Quay lại bản đồ">←</a>
<button class="sound-toggle" id="soundToggle" aria-label="Bật hoặc tắt âm thanh">🔊</button>

<div class="progress-dots" id="progressDots"></div>
<div class="count-badge" id="countBadge">0</div>
<div class="prompt" id="prompt">Chạm vào từng quả để đếm nhé!</div>

<div class="stage" id="stage"></div>
<div class="round-result-overlay" id="roundResultOverlay">
  <div class="round-result-card">
    <div class="round-result-emoji" id="roundResultEmoji">🍎</div>
    <div class="round-result-count" id="roundResultCount">3</div>
    <div class="round-result-text" id="roundResultText">Bé đếm được 3 quả táo!</div>
    <button id="roundContinueBtn">Tiếp tục →</button>
  </div>
</div>

<div class="complete-overlay" id="completeOverlay">
  <div class="complete-card">
    <div class="display">🎉 Bé đếm giỏi quá!</div>
    <p>Bé đã đếm hết các quả trên đảo số rồi đó!</p>
    <button id="backToMapBtn">Về bản đồ</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>
<script src="assets/js/reward-fx.js"></script>
<script src="assets/js/sound-manager.js"></script>
<script>
  // Each round: how many items, which fruit, and fixed scatter layout (in % of stage)
  const ROUNDS = [
    { total: 3,  fruit: '🍎' },
    { total: 5,  fruit: '🍌' },
    { total: 7,  fruit: '🍓' },
    { total: 10, fruit: '🍉' },
    { total: 14, fruit: '🍇' },
    { total: 20, fruit: '🍊' },
  ];

  const stage = document.getElementById('stage');
  const countBadge = document.getElementById('countBadge');
  const prompt = document.getElementById('prompt');
  const progressDots = document.getElementById('progressDots');
  const soundToggle = document.getElementById('soundToggle');

  let roundIndex = 0;
  let count = 0;

  soundToggle.addEventListener('click', () => {
    const nowMuted = !SoundManager.isMuted();
    SoundManager.setMuted(nowMuted);
    soundToggle.textContent = nowMuted ? '🔇' : '🔊';
  });

  ROUNDS.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot';
    d.dataset.i = i;
    progressDots.appendChild(d);
  });

  function updateDots() {
    progressDots.querySelectorAll('.dot').forEach((d, i) => {
      d.classList.toggle('done', i < roundIndex);
      d.classList.toggle('active', i === roundIndex);
    });
  }
  // ---------- Sinh vị trí bằng lưới có "rung" ngẫu nhiên (jittered grid) ----------
  // Không dùng rejection sampling nữa vì càng nhiều item, số lần thử càng tăng
  // (chậm dần và có thể vẫn chồng lấn). Lưới đảm bảo KHÔNG CHỒNG LẤN bằng toán học
  // (mỗi item nằm trong 1 ô lưới riêng), thời gian chạy luôn ổn định dù bao nhiêu item.
  const BASE_ITEM_SIZE = 90; // px — kích thước lý tưởng khi ít item (khớp 9rem cũ)
  const MIN_ITEM_SIZE = 48;  // px — sàn tối thiểu để bé vẫn chạm trúng dễ dàng
  const SPACING_FACTOR = 1.15; // khoảng đệm giữa các ô, tránh item dính sát mép nhau

  function computeItemSize(count, w, h) {
    const aspect = w / h;
    const cols = Math.max(1, Math.ceil(Math.sqrt(count * aspect)));
    const rows = Math.max(1, Math.ceil(count / cols));
    const cellW = w / cols, cellH = h / rows;
    const fitSize = Math.min(cellW, cellH) / SPACING_FACTOR;
    return { itemSize: Math.max(MIN_ITEM_SIZE, Math.min(BASE_ITEM_SIZE, fitSize)), cols, rows };
  }

  function generatePositions(count, itemSize, cols, rows, w, h) {
    const cellW = w / cols, cellH = h / rows;

    // Tạo danh sách toàn bộ ô lưới rồi xáo trộn (Fisher–Yates), chỉ lấy `count` ô đầu
    // -> item rải rác khắp lưới thay vì luôn dồn về góc trên-trái.
    const cells = [];
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) cells.push({ r, c });
    }
    for (let i = cells.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [cells[i], cells[j]] = [cells[j], cells[i]];
    }

    const jitterW = Math.max(0, cellW - itemSize);
    const jitterH = Math.max(0, cellH - itemSize);

    return cells.slice(0, count).map(({ r, c }) => {
      const px = c * cellW + itemSize / 2 + Math.random() * jitterW;
      const py = r * cellH + itemSize / 2 + Math.random() * jitterH;
      return { left: (px / w) * 100, top: (py / h) * 100 };
    });
  }
function loadRound(i) {
    count = 0;
    countBadge.textContent = '0';
    stage.innerHTML = '';
    const round = ROUNDS[i];
    prompt.textContent = `Có mấy quả ${fruitWord(round.fruit)} trên đảo nhỉ?`;

    const rect = stage.getBoundingClientRect();
    const w = Math.max(rect.width, BASE_ITEM_SIZE * 3);
    const h = Math.max(rect.height, BASE_ITEM_SIZE * 3);
    const { itemSize, cols, rows } = computeItemSize(round.total, w, h);
    const positions = generatePositions(round.total, itemSize, cols, rows, w, h);

    positions.forEach((pos, idx) => {
      const btn = document.createElement('button');
      btn.className = 'fruit-btn';
      btn.textContent = round.fruit;
      btn.style.left = pos.left + '%';
      btn.style.top = pos.top + '%';
      btn.style.width = itemSize + 'px';
      btn.style.height = itemSize + 'px';
      btn.style.fontSize = (itemSize * 0.62) + 'px';
      btn.dataset.idx = idx;
      btn.addEventListener('click', () => tapFruit(btn));
      stage.appendChild(btn);
      gsap.from(btn, { scale: 0, opacity: 0, duration: 0.5, delay: idx * 0.06, ease: 'back.out(2)' });
    });

    twemoji.parse(stage, { folder: 'svg', ext: '.svg' });
    updateDots();
  }
  function tapFruit(btn) {
    if (btn.classList.contains('counted')) return;
    btn.classList.add('counted');
    count++;
    countBadge.textContent = String(count);
    gsap.fromTo(countBadge, { scale: 1.3 }, { scale: 1, duration: 0.3, ease: 'back.out(2)' });
    gsap.fromTo(btn, { scale: 1.3 }, { scale: 1, duration: 0.25, ease: 'back.out(2)' });

    const rect = btn.getBoundingClientRect();
    celebrate(rect.left + rect.width / 2, rect.top + rect.height / 2);
    SoundManager.speak(String(count));

    const round = ROUNDS[roundIndex];
    if (count === round.total) {
      setTimeout(() => showRoundResult(round), 500);
    }
  }
  const FRUIT_WORDS = { '🍎': 'táo', '🍌': 'chuối', '🍓': 'dâu', '🍉': 'dưa hấu', '🍇': 'nho', '🍊': 'cam' };
  const fruitWord = (fruit) => FRUIT_WORDS[fruit] || 'quả';
  function showRoundResult(round) {
    const overlay = document.getElementById('roundResultOverlay');
    document.getElementById('roundResultEmoji').textContent = round.fruit;
    document.getElementById('roundResultCount').textContent = round.total;
    document.getElementById('roundResultText').textContent =
      `Bé đếm được ${round.total} quả ${fruitWord(round.fruit)}!`;
    twemoji.parse(overlay, { folder: 'svg', ext: '.svg' });

    overlay.classList.add('show');
    celebrateBig();
    SoundManager.speak(`Bé đếm được ${round.total} quả ${fruitWord(round.fruit)}! Giỏi quá!`);
  }

  document.getElementById('roundContinueBtn').addEventListener('click', () => {
    document.getElementById('roundResultOverlay').classList.remove('show');
    if (roundIndex === ROUNDS.length - 1) {
      setTimeout(() => {
        celebrateBig();
        document.getElementById('completeOverlay').classList.add('show');
      }, 200);
    } else {
      roundIndex++;
      loadRound(roundIndex);
    }
  });

  document.getElementById('backToMapBtn').addEventListener('click', () => {
    window.location.href = 'index.html';
  });

  loadRound(0);
</script>
</body>
